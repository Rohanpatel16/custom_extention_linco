<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linco — AI Message Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-wrapper">

    <!-- Header -->
    <header class="header" id="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="url(#g1)"/>
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7C3AED"/>
                <stop offset="1" stop-color="#2563EB"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Linco</span>
      </div>
      <div class="status-badge" id="status-badge">
        <span class="status-dot dot-idle" id="status-dot"></span>
        <span class="status-text" id="status-text">Ready</span>
        <span class="strength-badge" id="strength-score" style="display:none;"></span>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark theme">
          <svg class="theme-icon-dark" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="theme-icon-light" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="settings-toggle-btn" id="settings-toggle" title="Settings" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Drawer (previously settings-card) -->
    <div class="settings-card" id="settings-card">
      <div class="drawer-header">
        <span class="drawer-title">Settings</span>
        <button class="drawer-close" id="settings-close" type="button" title="Close Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body" id="settings-body">
        <label class="field-label" for="api-key-input">Gemini API Key</label>
        <div class="input-row">
          <input type="password" class="field-input" id="api-key-input" placeholder="Enter your API key…" autocomplete="off" />
          <button class="icon-btn" id="toggle-key-visibility" type="button" title="Show/Hide key">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <label class="field-label" for="model-select">Model</label>
        <select class="field-select" id="model-select">
          <option value="gemma-4-31b-it" selected>gemma-4-31b-it</option>
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-2.5-pro">gemini-2.5-pro</option>
          <option value="gemini-3.1-flash-lite">gemini-3.1-flash-lite</option>
          <option value="gemma-4-26b-a4b-it">gemma-4-26b-a4b-it</option>
        </select>

        <label class="field-label" for="persona-input">Your Persona</label>
        <textarea class="field-textarea" id="persona-input" rows="3" placeholder="e.g. I'm a ML researcher at Google looking for collaboration…"></textarea>

        <label class="field-label" for="pitch-input">Services / Offer Pitch</label>
        <textarea class="field-textarea" id="pitch-input" rows="3" placeholder="e.g. Premium recruitment and staffing services to help scale engineering teams…"></textarea>

        <label class="field-label" for="prompt-input">Custom Prompt Template</label>
        <textarea class="field-textarea" id="prompt-input" rows="4" placeholder="Configure how the AI writes messages. Placeholders: {{instruction}}, {{constraint}}, {{tone}}, {{length_guide}}, {{language_instruction}}, {{profile_summary}}, {{persona_section}}"></textarea>

        <button class="save-settings-btn" id="save-settings-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Save Settings
        </button>
      </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs-nav" id="tabs-nav">
      <button class="tab-btn active" id="tab-message" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Message Gen</span>
      </button>
      <button class="tab-btn" id="tab-call-prep" type="button">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span>Call Prep</span>
      </button>
    </div>

    <!-- ═══════════ Single Page Content ═══════════ -->
    <main class="main" id="main-content">

      <!-- Auto-extract status -->
      <div class="auto-extract-status" id="auto-extract-status">
        <div class="auto-extract-dot dot-scanning" id="auto-extract-dot"></div>
        <span class="auto-extract-text" id="auto-extract-text">Scanning profile…</span>
      </div>

      <!-- Tab Content: Message Generator -->
      <div class="tab-content active" id="message-tab-content">
        <!-- Message Controls -->
        <div class="msg-controls">
          <div class="control-row">
            <div class="control-group">
              <label class="field-label" for="msg-type-select">Message Type</label>
              <select class="field-select field-select-sm" id="msg-type-select">
                <option value="connection" selected>Connection Request</option>
                <option value="inmail">InMail</option>
                <option value="followup">Follow-up</option>
                <option value="cold_outreach">Cold Outreach</option>
                <option value="recruiter">Recruiter Pitch</option>
                <option value="thank_you">Thank You</option>
              </select>
            </div>
            <div class="control-group">
              <label class="field-label" for="tone-select">Tone</label>
              <select class="field-select field-select-sm" id="tone-select">
                <option value="professional" selected>Professional</option>
                <option value="casual">Casual</option>
                <option value="friendly">Friendly</option>
                <option value="formal">Formal</option>
                <option value="witty">Witty</option>
              </select>
            </div>
          </div>
          <div class="control-row">
            <div class="control-group">
              <label class="field-label" for="length-select">Length</label>
              <select class="field-select field-select-sm" id="length-select">
                <option value="short">Short</option>
                <option value="medium" selected>Medium</option>
                <option value="long">Long</option>
              </select>
            </div>
            <div class="control-group">
              <label class="field-label" for="language-select">Language</label>
              <select class="field-select field-select-sm" id="language-select">
                <option value="english" selected>English</option>
                <option value="spanish">Español</option>
                <option value="french">Français</option>
                <option value="german">Deutsch</option>
                <option value="portuguese">Português</option>
                <option value="hindi">हिन्दी</option>
                <option value="chinese">中文</option>
                <option value="japanese">日本語</option>
                <option value="korean">한국어</option>
                <option value="arabic">العربية</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Generate button -->
        <button class="generate-btn" id="generate-btn" disabled style="margin-top: 14px;">
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </span>
          <span class="btn-text">Generate Message</span>
        </button>

        <!-- Error box -->
        <div class="error-box" id="ai-error-box" style="display:none; margin-top: 14px;"></div>

        <!-- Connection request output -->
        <div class="preview-panel connection-panel" id="connection-preview-panel" style="display:none; margin-top: 14px;">
          <div class="preview-header">
            <span class="preview-label">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
              Your Message
            </span>
            <span class="char-count" id="char-count"></span>
          </div>
          <div class="connection-text" id="connection-text" contenteditable="true"></div>
          <div class="connection-actions">
            <button class="copy-btn" id="copy-connection-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
            <button class="regenerate-btn" id="regenerate-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Regenerate
            </button>
          </div>
        </div>
      </div>

      <!-- Tab Content: Call Prep -->
      <div class="tab-content" id="call-prep-tab-content" style="display: none;">
        <!-- Generate button -->
        <button class="generate-btn" id="generate-prep-btn" disabled>
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <span class="btn-text">Generate Call Prep</span>
        </button>

        <!-- Error box -->
        <div class="error-box" id="prep-error-box" style="display:none; margin-top: 14px;"></div>

        <!-- Call Prep output -->
        <div class="preview-panel prep-panel" id="prep-preview-panel" style="display:none; margin-top: 14px;">
          <div class="preview-header">
            <span class="preview-label">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
              Call Prep Guide
            </span>
          </div>
          <!-- Made scrollable and styled for markdown display -->
          <div class="connection-text prep-text" id="prep-text" contenteditable="true" style="height: 250px;"></div>
          <div class="connection-actions">
            <button class="copy-btn" id="copy-prep-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy Prep
            </button>
            <button class="regenerate-btn" id="regenerate-prep-btn">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Regenerate
            </button>
          </div>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>Linco v2.1 · <a href="https://linkedin.com" target="_blank">LinkedIn</a> only</span>
    </footer>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="popup.js"></script>
</body>
</html>
